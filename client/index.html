<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&amp;D 3.5 Table</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #1a1a2e; }
      canvas { display: block; }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        color: #c8c8d0;
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 13px;
        pointer-events: none;
        z-index: 10;
        user-select: none;
        display: none; /* VQ-008: hidden by default — shown only in ?debug=1 mode */
      }
      #hud .key { color: #7b7bff; }
      #pending-overlay {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        color: #ffe066;
        font-family: 'Consolas', monospace;
        font-size: 16px;
        background: rgba(0,0,0,0.7);
        padding: 10px 24px;
        border-radius: 6px;
        border: 1px solid #ffe066;
        display: none;
        z-index: 20;
        cursor: pointer;
        pointer-events: auto;
      }
      /* Slice 7: AoE confirm gate — minimal DOM, no popover (doctrine §3) */
      #aoe-overlay {
        position: fixed;
        bottom: 72px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        background: rgba(0,0,0,0.82);
        border: 1px solid #ff8844;
        border-radius: 6px;
        padding: 12px 24px;
        z-index: 25;
        pointer-events: auto;
      }
      #aoe-label {
        color: #ff9955;
        font-family: 'Consolas', monospace;
        font-size: 14px;
        letter-spacing: 0.04em;
      }
      #aoe-overlay button {
        font-family: 'Consolas', monospace;
        font-size: 13px;
        border: none;
        border-radius: 4px;
        padding: 5px 18px;
        cursor: pointer;
      }
      #aoe-confirm { background: #4a8a4a; color: #eee; margin-right: 8px; }
      #aoe-cancel  { background: #6a2a2a; color: #eee; }
      /* WO-UI-HANDOUT-READ-001: fullscreen handout read overlay */
      #handout-read-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.88);
        z-index: 50;
        cursor: pointer;
        pointer-events: auto;
      }
      #handout-read-overlay canvas {
        max-width: 80vw;
        max-height: 88vh;
        border: 2px solid #8a7a5a;
        border-radius: 4px;
        box-shadow: 0 0 40px rgba(0,0,0,0.9);
        image-rendering: auto;
      }
      /* WO-UI-TEXT-INPUT-001: accessibility text input fallback (STT absent) */
      #text-input-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 48px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 16px;
        background: rgba(8,6,10,0.88);
        border-top: 1px solid #2a2040;
        z-index: 15;
        pointer-events: auto;
      }
      #text-input-bar input {
        flex: 1;
        height: 30px;
        background: rgba(255,255,255,0.06);
        border: 1px solid #3a3060;
        border-radius: 4px;
        color: #c8c8d0;
        font-family: 'Consolas', monospace;
        font-size: 13px;
        padding: 0 10px;
        outline: none;
      }
      #text-input-bar input::placeholder { color: #5a5870; }
      #text-input-bar input:focus { border-color: #6060a0; }
      #text-input-send {
        height: 30px;
        padding: 0 14px;
        background: #2a2060;
        color: #c0b8e0;
        border: 1px solid #3a3080;
        border-radius: 4px;
        font-family: 'Consolas', monospace;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
      }
      #text-input-send:hover { background: #3a30a0; }
    </style>
  </head>
  <body>
    <div id="hud">
      <div><span class="key">[1]</span> Standard &nbsp; <span class="key">[2]</span> Down &nbsp; <span class="key">[3]</span> Lean Forward &nbsp; <span class="key">[4]</span> Dice Tray</div>
      <div id="posture-label">Posture: STANDARD</div>
      <div id="ws-status">WS: disconnected</div>
    </div>
    <div id="pending-overlay">Click to drop dice</div>
    <!-- Slice 7: AoE confirm gate (doctrine §3 — no popover, minimal DOM) -->
    <div id="aoe-overlay">
      <div id="aoe-label">AoE Preview</div>
      <div>
        <button class="btn-confirm" id="aoe-confirm">Confirm</button>
        <button class="btn-cancel"  id="aoe-cancel">Cancel</button>
      </div>
    </div>
    <!-- WO-UI-HANDOUT-READ-001: fullscreen read view (click to dismiss) -->
    <div id="handout-read-overlay"></div>
    <!-- WO-UI-TEXT-INPUT-001: accessibility text input fallback -->
    <div id="text-input-bar">
      <input id="text-input-field" type="text" placeholder="Type a command or message… (Enter to send)" autocomplete="off" spellcheck="false" />
      <button id="text-input-send">Send</button>
    </div>
    <!-- VQ-008: Show dev HUD only in debug mode -->
    <script>if (new URLSearchParams(location.search).get('debug') === '1') { document.getElementById('hud').style.display = 'block'; }</script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
