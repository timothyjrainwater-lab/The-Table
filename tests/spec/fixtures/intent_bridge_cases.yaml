# Intent Bridge Contract Compliance Test Fixtures
# WO-CODE-INTENT-002
#
# Each case defines:
#   transcript: Player speech text
#   confidence: STT confidence (default 1.0)
#   entities: World state entity definitions
#   expected: What the pipeline should produce
#   category: Test category for grouping

# ============================================================
# CATEGORY: clean_resolution
# Cases where the pipeline resolves cleanly without ambiguity
# ============================================================

- id: attack_single_target
  category: clean_resolution
  transcript: "I attack the goblin"
  confidence: 1.0
  entities:
    pc_rogue:
      team: party
      hp_current: 20
      ac: 16
      weapon:
        damage_dice: "1d6"
        damage_bonus: 0
        damage_type: "piercing"
    goblin_1:
      team: enemy
      hp_current: 6
      ac: 15
      entity_id: goblin_1
  expected:
    resolves: true
    intent_type: attack
    target: goblin_1

- id: attack_with_weapon
  category: clean_resolution
  transcript: "I attack the orc with my longsword"
  confidence: 1.0
  entities:
    pc_fighter:
      team: party
      hp_current: 30
      ac: 18
      weapon:
        damage_dice: "1d8"
        damage_bonus: 1
        damage_type: "slashing"
        name: "longsword"
    orc_1:
      team: enemy
      hp_current: 10
      ac: 13
      entity_id: orc_1
  expected:
    resolves: true
    intent_type: attack

- id: cast_magic_missile
  category: clean_resolution
  transcript: "I cast magic missile at the goblin"
  confidence: 1.0
  entities:
    pc_wizard:
      team: party
      hp_current: 15
      ac: 12
    goblin_1:
      team: enemy
      hp_current: 6
      ac: 15
      entity_id: goblin_1
  expected:
    resolves: true
    intent_type: cast_spell

- id: move_action
  category: clean_resolution
  transcript: "I move to the door"
  confidence: 1.0
  entities:
    pc_rogue:
      team: party
      hp_current: 20
      position: {x: 0, y: 0}
  expected:
    resolves: false
    needs_clarification: true
    clarification_type: location

# ============================================================
# CATEGORY: target_ambiguity
# Cases where multiple entities match the target reference
# ============================================================

- id: two_goblins_ambiguous
  category: target_ambiguity
  transcript: "I attack the goblin"
  confidence: 1.0
  entities:
    pc_rogue:
      team: party
      hp_current: 20
    goblin_warrior:
      team: enemy
      hp_current: 8
      ac: 15
      entity_id: goblin_warrior
    goblin_archer:
      team: enemy
      hp_current: 5
      ac: 14
      entity_id: goblin_archer
  expected:
    resolves: false
    needs_clarification: true
    ambiguity_type: target_ambiguous
    candidates_contain: ["goblin_warrior", "goblin_archer"]

- id: three_orcs_ambiguous
  category: target_ambiguity
  transcript: "I attack the orc"
  confidence: 1.0
  entities:
    pc_fighter:
      team: party
      hp_current: 30
    orc_berserker:
      team: enemy
      hp_current: 12
      entity_id: orc_berserker
    orc_shaman:
      team: enemy
      hp_current: 8
      entity_id: orc_shaman
    orc_scout:
      team: enemy
      hp_current: 7
      entity_id: orc_scout
  expected:
    resolves: false
    needs_clarification: true
    ambiguity_type: target_ambiguous

