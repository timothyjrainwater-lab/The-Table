# ============================================================
# CATEGORY: pronoun_resolution
# Cases testing cross-turn reference via STMContext
# ============================================================

- id: pronoun_him_after_attack
  category: pronoun_resolution
  transcript: "I attack him"
  confidence: 1.0
  stm_context:
    last_target: "goblin_1"
    last_action: "attack"
  entities:
    pc_rogue:
      team: party
      hp_current: 20
    goblin_1:
      team: enemy
      hp_current: 6
      entity_id: goblin_1
  expected:
    resolves: true
    intent_type: attack

- id: again_repeats_last_action
  category: pronoun_resolution
  transcript: "again"
  confidence: 1.0
  stm_context:
    last_target: "goblin_1"
    last_action: "attack"
    last_weapon: "longsword"
  entities:
    pc_rogue:
      team: party
      hp_current: 20
    goblin_1:
      team: enemy
      hp_current: 6
      entity_id: goblin_1
  expected:
    resolves: true

