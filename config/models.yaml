# Spark Model Registry
# Configuration file for swappable LLM model loading
#
# This file defines available LLM models and their hardware requirements.
# Models are automatically selected based on detected hardware tier.
#
# Reference: SPARK_ADAPTER_ARCHITECTURE.md, SPARK_PROVIDER_CONTRACT.md
# Status: M2 Preparation (Design-Only)
# Date: 2026-02-11
# Last Updated: R1 Technology Stack Validation (Opus, 2026-02-11)

spark:
  # Default model (used if user doesn't override)
  default: "qwen25-7b-instruct-4bit"

  # Available models (user-selectable)
  models:
    # ═════════════════════════════════════════════════════════════════
    # EVAL-SELECTED: Qwen2.5 7B (5/5 gates, WO-SPARK-LLM-SELECTION)
    # ═════════════════════════════════════════════════════════════════

    - id: "qwen25-7b-instruct-4bit"
      name: "Qwen2.5 7B Instruct (Q4_K_M)"
      provider: "llamacpp"
      path: "models/Qwen2.5-7B-Instruct-Q4_K_M.gguf"
      quantization: "4bit"
      max_tokens: 2048
      max_context_window: 2048
      min_vram_gb: 6.0
      min_ram_gb: 16.0
      supports_streaming: true
      supports_json_mode: false
      backend: "llama.cpp"
      tier: "MEDIUM"
      fallback_model: "qwen3-4b-instruct-4bit"
      presets:
        narration:
          temperature: 0.8
          max_tokens: 150
          stop_sequences: ["</narration>", "\n\n", "==="]
        query:
          temperature: 0.3
          max_tokens: 50
      description: "Selected by WO-SPARK-LLM-SELECTION. 5/5 eval gates. 24.0/25 quality. 2.69s load. RTX 3080 Ti."

    # ═════════════════════════════════════════════════════════════════
    # HIGH TIER: 14B Models (requires ≥8 GB VRAM)
    # ═════════════════════════════════════════════════════════════════

    - id: "qwen3-14b-instruct-4bit"
      name: "Qwen3 14B Instruct (Q4_K_M)"
      provider: "llamacpp"
      path: "models/qwen3-14b-instruct-Q4_K_M.gguf"
      quantization: "4bit"
      max_tokens: 2048
      max_context_window: 32768
      min_vram_gb: 10.0
      min_ram_gb: 16.0
      supports_streaming: true
      supports_json_mode: false
      backend: "llama.cpp"
      tier: "HIGH"
      fallback_model: "qwen3-8b-instruct-4bit"
      presets:
        narration:
          temperature: 0.8
          max_tokens: 150
          stop_sequences: ["</narration>", "\n\n", "==="]
        query:
          temperature: 0.3
          max_tokens: 50
          stop_sequences: []
      description: "Best narration quality for systems with ≥10 GB VRAM. 85% human preference in roleplay."

    - id: "gemma3-12b-qat"
      name: "Gemma 3 12B QAT (Official Google GGUF)"
      provider: "llamacpp"
      path: "models/gemma-3-12b-it-qat-q4_k_m.gguf"
      quantization: "4bit"
      max_tokens: 2048
      max_context_window: 32768
      min_vram_gb: 8.0
      min_ram_gb: 16.0
      supports_streaming: true
      supports_json_mode: false
      backend: "llama.cpp"
      tier: "HIGH"
      fallback_model: "qwen3-8b-instruct-4bit"
      presets:
        narration:
          temperature: 0.8
          max_tokens: 150
          stop_sequences: ["</narration>", "\n\n", "==="]
        query:
          temperature: 0.3
          max_tokens: 50
          stop_sequences: []
      description: "Best prose quality among open-weight models. Official QAT GGUFs from Google."

    # ═════════════════════════════════════════════════════════════════
    # MEDIUM TIER: 7-8B Models (requires 6-8 GB VRAM)
    # ═════════════════════════════════════════════════════════════════

    - id: "qwen3-8b-instruct-4bit"
      name: "Qwen3 8B Instruct (Q4_K_M)"
      provider: "llamacpp"
      path: "models/qwen3-8b-instruct-Q4_K_M.gguf"
      quantization: "4bit"
      max_tokens: 2048
      max_context_window: 32768
      min_vram_gb: 6.0
      min_ram_gb: 16.0
      supports_streaming: true
      supports_json_mode: false
      backend: "llama.cpp"
      tier: "MEDIUM"
      fallback_model: "qwen3-4b-instruct-4bit"
      presets:
        narration:
          temperature: 0.8
          max_tokens: 150
          stop_sequences: ["</narration>", "\n\n", "==="]
        query:
          temperature: 0.3
          max_tokens: 50
          stop_sequences: []
      description: "Balanced performance for mid-range GPUs. Outperforms old Qwen 2.5 14B on 15 benchmarks."

    - id: "llama-3.1-8b-instruct-4bit"
      name: "LLaMA 3.1 8B Instruct (Q4_K_M)"
      provider: "llamacpp"
      path: "models/llama-3.1-8b-instruct-Q4_K_M.gguf"
      quantization: "4bit"
      max_tokens: 2048
      max_context_window: 8192
      min_vram_gb: 6.0
      min_ram_gb: 16.0
      supports_streaming: true
      supports_json_mode: false
      backend: "llama.cpp"
      tier: "MEDIUM"
      fallback_model: "qwen3-4b-instruct-4bit"
      presets:
        narration:
          temperature: 0.9
          max_tokens: 150
        query:
          temperature: 0.3
          max_tokens: 50
      description: "Meta's LLaMA 3.1 alternative for narrative generation"

    # ═════════════════════════════════════════════════════════════════
    # FALLBACK TIER: 3-4B Models (CPU-compatible or low VRAM)
    # ═════════════════════════════════════════════════════════════════

    - id: "qwen3-4b-instruct-4bit"
      name: "Qwen3 4B Instruct (Q4_K_M)"
      provider: "llamacpp"
      path: "models/qwen3-4b-instruct-Q4_K_M.gguf"
      quantization: "4bit"
      max_tokens: 1024
      max_context_window: 32768
      min_vram_gb: 3.0
      min_ram_gb: 4.0
      supports_streaming: true
      supports_json_mode: false
      backend: "llama.cpp"
      tier: "FALLBACK"
      fallback_model: "gemma3-4b-qat"
      offload_config:
        gpu_layers: 32
        offload_layers: 16
        min_gpu_layers: 8
      presets:
        narration:
          temperature: 0.9
          max_tokens: 100
          stop_sequences: ["</narration>"]
        query:
          temperature: 0.3
          max_tokens: 30
      description: "Minimum spec model for low VRAM (<6 GB) or CPU-only systems"

    - id: "gemma3-4b-qat"
      name: "Gemma 3 4B QAT (Official Google GGUF)"
      provider: "llamacpp"
      path: "models/gemma-3-4b-it-qat-q4_k_m.gguf"
      quantization: "4bit"
      max_tokens: 1024
      max_context_window: 32768
      min_vram_gb: 3.0
      min_ram_gb: 4.0
      supports_streaming: true
      supports_json_mode: false
      backend: "llama.cpp"
      tier: "FALLBACK"
      fallback_model: "template-narration"
      offload_config:
        gpu_layers: 32
        offload_layers: 16
        min_gpu_layers: 8
      presets:
        narration:
          temperature: 0.9
          max_tokens: 100
        query:
          temperature: 0.3
          max_tokens: 30
      description: "Alternative fallback with excellent prose quality on minimal hardware"

    # ═════════════════════════════════════════════════════════════════
    # TEMPLATE FALLBACK: No LLM (M0 Template-Based Narration)
    # ═════════════════════════════════════════════════════════════════

    - id: "template-narration"
      name: "Template-Based Narration (No LLM)"
      provider: "template"
      path: null
      quantization: null
      max_tokens: null
      max_context_window: null
      min_vram_gb: 0.0
      min_ram_gb: 0.0
      supports_streaming: false
      supports_json_mode: false
      backend: "template"
      tier: "FALLBACK"
      fallback_model: null
      description: "Ultimate fallback - uses M0 template system (no model loading)"

# ═════════════════════════════════════════════════════════════════════
# Tier Selection Rules
# Automatic model selection based on detected hardware
# ═════════════════════════════════════════════════════════════════════

tier_selection:
  HIGH:
    min_vram_gb: 8.0
    preferred_model: "qwen3-14b-instruct-4bit"
    alternatives:
      - "gemma3-12b-qat"
    description: "High-end GPUs (RTX 3060 12GB, RTX 3090, RTX 4080)"

  MEDIUM:
    min_vram_gb: 6.0
    preferred_model: "qwen3-8b-instruct-4bit"
    alternatives:
      - "llama-3.1-8b-instruct-4bit"
    description: "Mid-range GPUs (RTX 3060 8GB, RTX 2060, GTX 1070, RX 6600 XT)"

  FALLBACK:
    min_vram_gb: 0.0
    preferred_model: "qwen3-4b-instruct-4bit"
    alternatives:
      - "gemma3-4b-qat"
    description: "Low VRAM (<6 GB) or CPU-only systems"

  TEMPLATE:
    min_vram_gb: 0.0
    preferred_model: "template-narration"
    alternatives: []
    description: "Ultimate fallback when all models fail (no LLM required)"

# ═════════════════════════════════════════════════════════════════════
# Offload Configuration
# CPU offload strategies when VRAM is insufficient
# ═════════════════════════════════════════════════════════════════════

offload_strategy:
  # Full GPU loading (VRAM >= model requirements)
  full_gpu:
    condition: "vram_available >= model.min_vram_gb"
    gpu_layers: "max"
    offload_layers: 0
    description: "Load entire model on GPU"

  # Partial offload (VRAM >= 50% of requirements)
  partial_offload:
    condition: "vram_available >= (model.min_vram_gb * 0.5)"
    gpu_layers: "auto"
    offload_layers: "auto"
    quantization: "8bit"
    description: "Offload some layers to CPU, use 8-bit quantization"

  # Full CPU offload (VRAM < 50% of requirements or no GPU)
  full_cpu:
    condition: "vram_available < (model.min_vram_gb * 0.5) OR no_gpu"
    gpu_layers: 0
    offload_layers: 999
    device_map: "cpu"
    description: "Run entirely on CPU (slow but functional)"

# ═════════════════════════════════════════════════════════════════════
# Provider Configuration
# Backend-specific settings
# ═════════════════════════════════════════════════════════════════════

providers:
  llamacpp:
    backend: "llama-cpp-python"
    version: ">=0.3.0"
    supports_streaming: true
    supports_json_mode: false
    supports_tool_calling: false
    supports_seeded_generation: true
    supports_batch_inference: false
    supports_stop_sequences: true
    default_settings:
      n_ctx: 8192
      n_batch: 512
      n_threads: null  # Auto-detect CPU cores
      use_mlock: true
      use_mmap: true

  transformers:
    backend: "transformers"
    version: ">=4.38.0"
    supports_streaming: true
    supports_json_mode: false
    supports_tool_calling: false
    supports_seeded_generation: true
    supports_batch_inference: true
    supports_stop_sequences: true
    default_settings:
      device_map: "auto"
      torch_dtype: "auto"
      low_cpu_mem_usage: true

  template:
    backend: "aidm.narration.narrator"
    version: "M0"
    supports_streaming: false
    supports_json_mode: false
    description: "M0 template-based narration (no model loading)"

# ═════════════════════════════════════════════════════════════════════
# Validation Rules
# Runtime validation checks for model registry
# ═════════════════════════════════════════════════════════════════════

validation:
  required_fields:
    - "id"
    - "name"
    - "provider"
    - "tier"
    - "min_vram_gb"
    - "min_ram_gb"

  error_handling:
    missing_model_file: "skip_model"
    invalid_schema: "use_default_config"
    circular_fallback: "reject_chain"
    provider_unavailable: "warn_and_skip"

  startup_checks:
    - "validate_schema"
    - "check_model_files_exist"
    - "verify_provider_installed"
    - "check_fallback_chain_acyclic"
    - "validate_tier_rules"

# ═════════════════════════════════════════════════════════════════════
# Notes
# ═════════════════════════════════════════════════════════════════════

notes: |
  This configuration file enables swappable LLM backends without code changes.

  Model Selection Process:
  1. Hardware detector (Agent B) determines tier (HIGH/MEDIUM/FALLBACK)
  2. Spark adapter reads this file and selects preferred_model for tier
  3. If model load fails, adapter tries fallback_model
  4. Fallback chain terminates at template-narration (always succeeds)

  User Overrides:
  - Environment: AIDM_SPARK_MODEL=qwen3-4b-instruct-4bit
  - CLI: aidm-cli --spark-model qwen3-4b-instruct-4bit
  - Runtime: /settings spark-model qwen3-4b-instruct-4bit

  Model File Provisioning:
  - Models referenced here are NOT included in repository
  - Users must download models separately (see INSTALLATION.md)
  - Model paths are relative to AIDM installation directory

  R1 Update (2026-02-11):
  - Replaced Mistral 7B/14B with Qwen3 8B/14B (85% human preference in roleplay)
  - Replaced Phi-3 Mini / StableLM-3B with Qwen3 4B / Gemma 3 4B
  - Replaced Qwen 2.5 with Qwen3 (outperforms on 15 benchmarks)
  - Added Gemma 3 as alternative (best prose quality among open-weight models)
  - Updated llama-cpp-python version to >=0.3.0
  - Context windows updated (Qwen3 supports 32K natively)

  Reference Documentation:
  - SPARK_ADAPTER_ARCHITECTURE.md: Design specification
  - SPARK_PROVIDER_CONTRACT.md: Interface contract
  - HARDWARE_DETECTION_SYSTEM.md: Tier detection logic
  - pm_inbox/OPUS_R1_TECHNOLOGY_STACK_VALIDATION.md: Research backing
