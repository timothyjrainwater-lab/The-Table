<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnD 3.5 — Illustrated Table</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="posture-standard">

  <!-- Vignette overlay — fixed, non-interactive -->
  <div id="vignette"></div>

  <!-- WS status indicator — diegetic amber dot -->
  <div id="ws-status" class="ws-status-connecting" title="Connection Status"></div>

  <!-- DM panel — exploration/roleplay mode only. Hidden by default.
       Slides down from top on speaking_start (wired in WO-UI-2D-DM-PANEL-001). -->
  <div id="dm-panel" style="display:none">
    <div id="dm-panel-portrait"></div>
    <div id="dm-panel-text"></div>
  </div>

  <!-- Main layout: scene surface (left) + right column -->
  <div id="layout">

    <!-- Scene Surface: DM display area — dominant left region, full height.
         May show battle grid, town painting, NPC portrait, dungeon map, etc.
         The DM puts things on it. Not just a battle map. -->
    <div id="scene-surface">
      <div id="scene-display">
        <div id="scene-label">Scene</div>
        <!-- Live scene canvas added by WO-UI-2D-MAP-001 -->
      </div>
    </div><!-- /#scene-surface -->

    <!-- Right column: speaker panel (top, DM seat) + dice section (bottom) -->
    <div id="right-col">

      <!-- Speaker Panel — DM seat. Always occupied. Portrait + beats + heartbeat orb. -->
      <div id="speaker-panel">

        <!-- Portrait placeholder — ORB-001 populates with DM crest / NPC portrait -->
        <div id="speaker-portrait"></div>

        <!-- Beat strip — ORB-001 renders short text beats here.
             Opacity-only aging. Newest at bottom. No scroll chat. -->
        <div id="speaker-beats"></div>

        <!-- Orb — heartbeat indicator only. Small (36px). Not the face.
             Ambient amber glow at idle. Pulses on speaking_start. -->
        <div id="orb">
          <div>
            <img id="orb-portrait" src="" alt="">
          </div>
        </div>

      </div><!-- /#speaker-panel -->

      <!-- Orb transcript — compact strip, combat mode only. Hidden by default.
           Wired in WO-UI-2D-DM-PANEL-001. -->
      <div id="orb-transcript" style="display:none"></div>

      <!-- Dice section — roll slip tray + handout tray -->
      <div id="dice-section">

        <!-- Roll slip tray — scrolls internally when slips stack -->
        <div id="slip-tray">
          <div id="slip-tray-label">Roll Slip Tray</div>
          <!-- Pending slips injected by WO-UI-2D-SLIP-001 -->
        </div>

        <!-- Handout tray — on demand, collapses when empty. Hidden by default. -->
        <div id="handout-tray" style="display:none">
          <div id="handout-tray-label">Handouts</div>
        </div>

      </div><!-- /#dice-section -->

    </div><!-- /#right-col -->

  </div><!-- /#layout -->

  <!-- Shelf zone + text input — single unified bottom rail -->
  <div id="shelf-zone">
    <button class="shelf-item" id="shelf-sheet"
      data-posture="posture-down" data-drawer="sheet-drawer">Sheet</button>
    <button class="shelf-item" id="shelf-notebook"
      data-posture="posture-down" data-drawer="notebook-drawer">Notebook</button>
    <button class="shelf-item" id="shelf-tome"
      data-posture="posture-down" data-drawer="tome-drawer">Tome</button>
    <button class="shelf-item" id="shelf-dice-bag"
      data-posture="posture-dice" data-drawer="dice-drawer">Dice Bag</button>

    <input type="text" id="player-input" placeholder="speak your action..." autocomplete="off">
    <button id="send-btn">&#9166;</button>

    <!-- Posture label — plain text, far right, keyboard feedback -->
    <span id="posture-label">STANDARD</span>
  </div><!-- /#shelf-zone -->

  <script src="ws.js"></script>
  <script src="orb.js"></script>   <!-- ORB-001 -->
  <script src="dm-panel.js"></script>   <!-- DM-PANEL-001 -->
  <script src="main.js"></script>
</body>
</html>
